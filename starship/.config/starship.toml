"$schema" = 'https://starship.rs/config-schema.json'

format = '''
$directory$git_branch$rust$python
$character'''

palette = 'colors'

[palettes.colors]
color1 = '#9ad4a2'
color2 = '#003917'
color3 = '#c1c9be'
color4 = '#1c211c'
color5 = '#003917'
color6 = '#101510'
color7 = '#101510'
color8 = '#9ad4a2'
color9 = '#a2ced8'

# Prompt symbols 
[character]
success_symbol = "[ ](color9 bold)"
error_symbol = "[ ](@{error})"
vicmd_symbol = "[](#f9e2af)"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
